name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-next/package-lock.json

      - name: Install dependencies
        working-directory: app-next
        run: npm ci

      - name: Type check
        working-directory: app-next
        run: npm run lint
